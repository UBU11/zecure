services:
  frontend:
    build:
      context: ./src/app
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=${VITE_SUPABASE_URL}
        - VITE_SUPABASE_ANON_KEY=${VITE_SUPABASE_ANON_KEY}
        - VITE_CLERK_PUBLISHABLE_KEY=${VITE_CLERK_PUBLISHABLE_KEY}
    container_name: zecure-frontend
    restart: unless-stopped
    expose:
      - "80"
    env_file: ./src/app/.env
    develop:
      watch:
        - action: sync
          path: ./src/app
          target: /app
          ignore:
            - node_modules/
        - action: rebuild
          path: ./src/app/package.json

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zecure-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - RABBITMQ_URL=amqp://rabbitmq:5672
      - MQTT_HOST=mqtt
      - MQTT_URL=mqtt://mqtt:1883
    develop:
      watch:
        - action: sync
          path: .
          target: /usr/src/app
          ignore:
            - node_modules/
        - action: rebuild
          path: package.json
    depends_on:
      - rabbitmq
      - mqtt

  rabbitmq:
    image: rabbitmq:3-management
    container_name: zecure-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: zecure-mqtt
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf

  nginx:
    image: nginx:latest
    container_name: zecure-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/zecure.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    container_name: zecure-agent
    restart: unless-stopped
    ports:
      - "3005:3005"
    env_file: ./agent/.env
    develop:
      watch:
        - action: sync
          path: ./agent/src
          target: /usr/src/app/src
          ignore:
            - node_modules/
        - action: rebuild
          path: ./agent/package.json
